<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dagens kamper</title>
  <style>
    :root{
      color-scheme: light;
      --bgTop:#243048;
      --bg:#edf1f5;
      --card:#f7f8fa;
      --card2:#f2f4f7;
      --text:#1f2937;
      --muted:#6b7280;
      --line:rgba(31,41,55,.08);
      --shadow:0 7px 18px rgba(15,23,42,.06);
      --radius:16px;

      --live:#22c55e;
      --liveBg:#edf9f1;
      --liveBorder:rgba(34,197,94,.18);

      --tabBg:rgba(255,255,255,.10);
      --tabBorder:rgba(255,255,255,.16);

      --toggleBg:rgba(255,255,255,.10);
      --toggleBorder:rgba(255,255,255,.14);

      --mizunoBg:rgba(59,130,246,.10);
      --mizunoBorder:rgba(59,130,246,.18);
      --mizunoText:#2563eb;

      --abroadBg:rgba(245,158,11,.10);
      --abroadBorder:rgba(245,158,11,.18);
      --abroadText:#b45309;

      --statusBg:#eef2f7;
    }

    body.dark{
      color-scheme: dark;
      --bgTop:#1f2937;
      --bg:#2b3442;
      --card:#364152;
      --card2:#313b4b;
      --text:#e7ebf1;
      --muted:#b3bdc9;
      --line:rgba(255,255,255,.08);
      --shadow:0 7px 18px rgba(0,0,0,.14);

      --live:#4ade80;
      --liveBg:rgba(74,222,128,.12);
      --liveBorder:rgba(74,222,128,.16);

      --tabBg:rgba(255,255,255,.07);
      --tabBorder:rgba(255,255,255,.10);

      --toggleBg:rgba(255,255,255,.07);
      --toggleBorder:rgba(255,255,255,.10);

      --mizunoBg:rgba(59,130,246,.12);
      --mizunoBorder:rgba(96,165,250,.18);
      --mizunoText:#93c5fd;

      --abroadBg:rgba(245,158,11,.12);
      --abroadBorder:rgba(251,191,36,.16);
      --abroadText:#fbbf24;

      --statusBg:#303a49;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:linear-gradient(180deg,var(--bgTop) 0%,var(--bgTop) 98px,var(--bg) 98px,var(--bg) 100%);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
      transition:background-color .2s ease,color .2s ease;
    }

    header{
      max-width:980px;
      margin:0 auto;
      padding:12px 10px 10px;
      color:#fff;
    }
    .headRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .headLeft{min-width:0}
    .headRight{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
      flex:0 0 auto;
    }
    h1{
      margin:0;
      font-size:17px;
      font-weight:900;
      letter-spacing:.18px;
    }
    .sub{
      margin:4px 0 0;
      font-size:11px;
      line-height:1.25;
      color:rgba(255,255,255,.78);
    }
    .lastUpdated{
      font-size:10px;
      white-space:nowrap;
      color:rgba(255,255,255,.75);
      text-align:right;
    }

    .themeToggle{
      appearance:none;
      border:1px solid var(--toggleBorder);
      background:var(--toggleBg);
      color:#fff;
      width:38px;
      height:38px;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      font-size:16px;
      line-height:1;
      backdrop-filter:blur(6px);
    }

    main{
      max-width:980px;
      margin:0 auto;
      padding:10px;
    }

    .summaryBar{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .summaryItem{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      box-shadow:var(--shadow);
    }
    .summaryLabel{
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.3px;
    }
    .summaryValue{
      margin-top:4px;
      font-size:20px;
      font-weight:950;
      line-height:1;
    }

    .section{
      margin-top:14px;
    }
    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
    }
    .sectionTitle h2{
      margin:0;
      font-size:14px;
      font-weight:900;
    }
    .sectionCount{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }

    .grid{
      display:grid;
      gap:8px;
      grid-template-columns:1fr;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .topRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }
    .leagueBlock{
      min-width:0;
      flex:1 1 auto;
    }
    .league{
      font-size:11px;
      font-weight:900;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta{
      margin-top:3px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .statusPill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      border:1px solid var(--line);
      background:var(--statusBg);
      color:var(--text);
      white-space:nowrap;
    }
    .statusPill.live{
      background:var(--liveBg);
      border-color:var(--liveBorder);
      color:var(--live);
    }
    .dot{
      width:6px;
      height:6px;
      border-radius:999px;
      background:var(--live);
      flex:0 0 auto;
    }

    .matchRow{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:8px;
      align-items:center;
    }
    .team{
      min-width:0;
      text-align:center;
    }
    .teamName{
      font-size:12px;
      font-weight:900;
      line-height:1.15;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      overflow:hidden;
    }
    .teamCountry{
      margin-top:3px;
      font-size:10px;
      color:var(--muted);
      font-weight:700;
    }

    .centerCol{
      min-width:82px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }
    .time{
      font-size:18px;
      font-weight:950;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .dateLine{
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      text-align:center;
      line-height:1.1;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      justify-content:center;
      margin-top:8px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:3px 7px;
      border-radius:999px;
      font-size:9px;
      font-weight:900;
      line-height:1;
      text-transform:uppercase;
    }
    .badge.mizuno{
      background:var(--mizunoBg);
      border:1px solid var(--mizunoBorder);
      color:var(--mizunoText);
    }
    .badge.abroad{
      background:var(--abroadBg);
      border:1px solid var(--abroadBorder);
      color:var(--abroadText);
    }

    .empty{
      padding:16px;
      border-radius:16px;
      text-align:center;
      background:var(--card);
      border:1px dashed var(--line);
      color:var(--muted);
      font-size:12px;
    }

    @media (min-width:700px){
      .grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width:420px){
      .summaryBar{
        grid-template-columns:1fr 1fr 1fr;
      }
      .summaryValue{
        font-size:18px;
      }
      .card{
        padding:9px;
      }
      .teamName{
        font-size:11px;
      }
      .time{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="headRow">
      <div class="headLeft">
        <h1>Dagens kamper</h1>
        <p class="sub">Kun kamper for lag som finnes i /teams (mizuno + abroad)</p>
      </div>
      <div class="headRight">
        <button id="themeToggle" class="themeToggle" type="button" aria-label="Bytt tema" title="Bytt dag/natt">🌙</button>
        <div id="lastUpdated" class="lastUpdated"></div>
      </div>
    </div>
  </header>

  <main>
    <div class="summaryBar">
      <div class="summaryItem">
        <div class="summaryLabel">Live</div>
        <div id="summaryLive" class="summaryValue">0</div>
      </div>
      <div class="summaryItem">
        <div class="summaryLabel">Senere i dag</div>
        <div id="summaryUpcoming" class="summaryValue">0</div>
      </div>
      <div class="summaryItem">
        <div class="summaryLabel">Ferdig</div>
        <div id="summaryFinished" class="summaryValue">0</div>
      </div>
    </div>

    <section class="section">
      <div class="sectionTitle">
        <h2>Live nå</h2>
        <div id="countLive" class="sectionCount">0 kamper</div>
      </div>
      <div id="liveGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="sectionTitle">
        <h2>Senere i dag</h2>
        <div id="countUpcoming" class="sectionCount">0 kamper</div>
      </div>
      <div id="upcomingGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="sectionTitle">
        <h2>Ferdig / tidligere i dag</h2>
        <div id="countFinished" class="sectionCount">0 kamper</div>
      </div>
      <div id="finishedGrid" class="grid"></div>
    </section>
  </main>

  <script>
    const TEAMS_API_URL = "https://volleyball.ronesse.no/teams?limit=200&offset=0";
    const EVENTS_API_BASE = "https://volleyball.ronesse.no/events";
    const THEME_KEY = "volley_theme_v1";

    let favoriteTeamIds = new Set();
    let favoriteTeamMeta = new Map();
    let todayMatches = [];

    function loadTheme(){
      try{
        return localStorage.getItem(THEME_KEY) || "";
      } catch {
        return "";
      }
    }

    function saveTheme(theme){
      try{
        localStorage.setItem(THEME_KEY, theme);
      } catch {}
    }

    function applyTheme(theme){
      const dark = theme === "dark";
      document.body.classList.toggle("dark", dark);
      const btn = document.getElementById("themeToggle");
      btn.textContent = dark ? "☀️" : "🌙";
      btn.setAttribute("title", dark ? "Bytt til dagmodus" : "Bytt til nattmodus");
      btn.setAttribute("aria-label", dark ? "Bytt til dagmodus" : "Bytt til nattmodus");
    }

    function initTheme(){
      const saved = loadTheme();
      if (saved === "dark" || saved === "light"){
        applyTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme(){
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      applyTheme(next);
      saveTheme(next);
    }

    function setLastUpdated(text){
      document.getElementById("lastUpdated").textContent = text;
    }

    async function getJson(url){
      const res = await fetch(url, {
        headers: { accept: "application/json" },
        cache: "no-store"
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function fetchTeams(){
      const data = await getJson(TEAMS_API_URL);
      return Array.isArray(data) ? data : [];
    }

    function buildFavoriteTeams(teams){
      const ids = new Set();
      const meta = new Map();

      for (const team of teams){
        const group = String(team.group_type || "").toLowerCase();
        if (group === "mizuno" || group === "abroad"){
          const id = String(team.id);
          ids.add(id);
          meta.set(id, {
            id,
            name: team.name || "",
            country: team.country || "",
            league: team.league || "",
            groupType: group
          });
        }
      }

      favoriteTeamIds = ids;
      favoriteTeamMeta = meta;
    }

    function getTodayRangeSeconds(){
      const now = new Date();

      const start = new Date(now);
      start.setHours(0,0,0,0);

      const end = new Date(now);
      end.setHours(23,59,59,999);

      return {
        fromTs: Math.floor(start.getTime() / 1000),
        toTs: Math.floor(end.getTime() / 1000)
      };
    }

    async function fetchTodayEvents(){
      const { fromTs, toTs } = getTodayRangeSeconds();
      const url = new URL(EVENTS_API_BASE);
      url.searchParams.set("from_ts", String(fromTs));
      url.searchParams.set("to_ts", String(toTs));
      url.searchParams.set("limit", "500");
      url.searchParams.set("offset", "0");

      const data = await getJson(url.toString());
      return Array.isArray(data) ? data : [];
    }

    function isFavoriteEvent(event){
      const homeId = String(event.home_team_id ?? "");
      const awayId = String(event.away_team_id ?? "");
      return favoriteTeamIds.has(homeId) || favoriteTeamIds.has(awayId);
    }

    function enrichEvent(event){
      const homeId = String(event.home_team_id ?? "");
      const awayId = String(event.away_team_id ?? "");

      const badges = [];
      if (favoriteTeamMeta.has(homeId)) badges.push(favoriteTeamMeta.get(homeId).groupType);
      if (favoriteTeamMeta.has(awayId)) badges.push(favoriteTeamMeta.get(awayId).groupType);

      return {
        ...event,
        badges: [...new Set(badges)]
      };
    }

    function getEventDate(event){
      const raw = event.start_utc || event.start_time || event.start || event.start_ts;
      if (raw == null) return null;

      if (typeof raw === "number"){
        const n = Number(raw);
        if (n > 1000000000000) return new Date(n);
        return new Date(n * 1000);
      }

      if (typeof raw === "string" && /^\d+$/.test(raw)){
        const n = Number(raw);
        if (n > 1000000000000) return new Date(n);
        return new Date(n * 1000);
      }

      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return null;
      return d;
    }

    function getEventState(event){
      const statusType = String(event.status_type || "").toLowerCase();
      const statusCode = Number(event.status_code || 0);

      if (statusType === "inprogress") return "live";
      if (statusType === "finished") return "finished";
      if (statusType === "notstarted") return "upcoming";

      const d = getEventDate(event);
      if (!d) return "upcoming";

      const now = new Date();
      if (d > now) return "upcoming";

      if (statusCode >= 100) return "finished";
      return "finished";
    }

    function formatTime(date){
      if (!date) return "--:--";
      return date.toLocaleTimeString("no-NO", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDateLine(date){
      if (!date) return "";
      return date.toLocaleDateString("no-NO", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      });
    }

    function getStatusLabel(event){
      const statusType = String(event.status_type || "").toLowerCase();
      const statusDesc = String(event.status_desc || "").trim();

      if (statusType === "inprogress") return statusDesc || "LIVE";
      if (statusType === "finished") return "Ferdig";
      if (statusType === "notstarted") return "Planlagt";
      return statusDesc || "Kamp";
    }

    function createBadge(text){
      const badge = document.createElement("div");
      badge.className = `badge ${text}`;
      badge.textContent = text;
      return badge;
    }

    function renderCard(event){
      const card = document.createElement("div");
      card.className = "card";

      const date = getEventDate(event);
      const state = getEventState(event);
      const statusLabel = getStatusLabel(event);

      const top = document.createElement("div");
      top.className = "topRow";

      const leagueBlock = document.createElement("div");
      leagueBlock.className = "leagueBlock";

      const league = document.createElement("div");
      league.className = "league";
      league.textContent = event.tournament_name || event.widget_name || event.league_name || "Kamp";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${event.season_name || ""}${event.round ? ` · Runde ${event.round}` : ""}`.trim() || "Dagens kamp";

      leagueBlock.appendChild(league);
      leagueBlock.appendChild(meta);

      const status = document.createElement("div");
      status.className = "statusPill" + (state === "live" ? " live" : "");
      if (state === "live"){
        const dot = document.createElement("span");
        dot.className = "dot";
        status.appendChild(dot);
      }
      const statusText = document.createElement("span");
      statusText.textContent = statusLabel;
      status.appendChild(statusText);

      top.appendChild(leagueBlock);
      top.appendChild(status);

      const matchRow = document.createElement("div");
      matchRow.className = "matchRow";

      const home = document.createElement("div");
      home.className = "team";
      home.innerHTML = `
        <div class="teamName">${event.home_team_name || "Hjemmelag"}</div>
        <div class="teamCountry">${favoriteTeamMeta.get(String(event.home_team_id || ""))?.country || ""}</div>
      `;

      const center = document.createElement("div");
      center.className = "centerCol";
      center.innerHTML = `
        <div class="time">${formatTime(date)}</div>
        <div class="dateLine">${formatDateLine(date)}</div>
      `;

      const away = document.createElement("div");
      away.className = "team";
      away.innerHTML = `
        <div class="teamName">${event.away_team_name || "Bortelag"}</div>
        <div class="teamCountry">${favoriteTeamMeta.get(String(event.away_team_id || ""))?.country || ""}</div>
      `;

      matchRow.appendChild(home);
      matchRow.appendChild(center);
      matchRow.appendChild(away);

      const badges = document.createElement("div");
      badges.className = "badges";
      event.badges.forEach(b => badges.appendChild(createBadge(b)));

      card.appendChild(top);
      card.appendChild(matchRow);
      if (event.badges.length) card.appendChild(badges);

      return card;
    }

    function renderSection(containerId, countId, items, emptyText){
      const container = document.getElementById(containerId);
      const countEl = document.getElementById(countId);

      container.innerHTML = "";
      countEl.textContent = `${items.length} ${items.length === 1 ? "kamp" : "kamper"}`;

      if (!items.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = emptyText;
        container.appendChild(empty);
        return;
      }

      items.forEach(item => container.appendChild(renderCard(item)));
    }

    function renderSummary(live, upcoming, finished){
      document.getElementById("summaryLive").textContent = String(live.length);
      document.getElementById("summaryUpcoming").textContent = String(upcoming.length);
      document.getElementById("summaryFinished").textContent = String(finished.length);
    }

    function renderAll(){
      const live = [];
      const upcoming = [];
      const finished = [];

      const sorted = todayMatches.slice().sort((a, b) => {
        const ad = getEventDate(a)?.getTime() ?? 0;
        const bd = getEventDate(b)?.getTime() ?? 0;
        return ad - bd;
      });

      for (const event of sorted){
        const state = getEventState(event);
        if (state === "live") live.push(event);
        else if (state === "upcoming") upcoming.push(event);
        else finished.push(event);
      }

      finished.sort((a, b) => (getEventDate(b)?.getTime() ?? 0) - (getEventDate(a)?.getTime() ?? 0));

      renderSummary(live, upcoming, finished);
      renderSection("liveGrid", "countLive", live, "Ingen livekamper akkurat nå.");
      renderSection("upcomingGrid", "countUpcoming", upcoming, "Ingen flere kamper senere i dag.");
      renderSection("finishedGrid", "countFinished", finished, "Ingen ferdige kamper i dag.");
    }

    async function refresh(){
      try {
        const [teams, events] = await Promise.all([
          fetchTeams(),
          fetchTodayEvents()
        ]);

        buildFavoriteTeams(teams);

        todayMatches = events
          .filter(isFavoriteEvent)
          .map(enrichEvent);

        renderAll();

        setLastUpdated(
          `Oppdatert ${new Date().toLocaleTimeString("no-NO", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          })}`
        );
      } catch (err) {
        const containers = ["liveGrid", "upcomingGrid", "finishedGrid"];
        for (const id of containers){
          const el = document.getElementById(id);
          el.innerHTML = `<div class="empty">Kunne ikke hente dagens kamper (${err.message}).</div>`;
        }
        document.getElementById("summaryLive").textContent = "0";
        document.getElementById("summaryUpcoming").textContent = "0";
        document.getElementById("summaryFinished").textContent = "0";
        document.getElementById("countLive").textContent = "0 kamper";
        document.getElementById("countUpcoming").textContent = "0 kamper";
        document.getElementById("countFinished").textContent = "0 kamper";
        setLastUpdated(`Feil ${new Date().toLocaleTimeString("no-NO", { hour:"2-digit", minute:"2-digit" })}`);
      }
    }

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);

    initTheme();
    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
