<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Spiller</title>
  <style>
    :root{
      color-scheme: light;
      --bgTop:#243048;
      --bg:#edf1f5;
      --card:#f7f8fa;
      --card2:#f2f4f7;
      --text:#1f2937;
      --muted:#6b7280;
      --line:rgba(31,41,55,.08);
      --shadow:0 8px 20px rgba(15,23,42,.06);
      --toggleBg:rgba(255,255,255,.10);
      --toggleBorder:rgba(255,255,255,.14);
      --pillBg:#eef2f7;
      --pillBorder:rgba(31,41,55,.08);
      --link:#2563eb;
      --accentBg:#eef6ff;
      --accentBorder:rgba(37,99,235,.15);
    }

    body.dark{
      color-scheme: dark;
      --bgTop:#1f2937;
      --bg:#2b3442;
      --card:#364152;
      --card2:#313b4b;
      --text:#e7ebf1;
      --muted:#b3bdc9;
      --line:rgba(255,255,255,.08);
      --shadow:0 8px 20px rgba(0,0,0,.15);
      --toggleBg:rgba(255,255,255,.07);
      --toggleBorder:rgba(255,255,255,.10);
      --pillBg:#303a49;
      --pillBorder:rgba(255,255,255,.08);
      --link:#93c5fd;
      --accentBg:#334155;
      --accentBorder:rgba(148,163,184,.18);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:linear-gradient(180deg,var(--bgTop) 0%,var(--bgTop) 98px,var(--bg) 98px,var(--bg) 100%);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }

    header{
      max-width:980px;
      margin:0 auto;
      padding:12px 10px 10px;
      color:#fff;
    }

    .headRow{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .headButtons{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .headLink,
    .themeToggle{
      appearance:none;
      border:1px solid var(--toggleBorder);
      background:var(--toggleBg);
      color:#fff;
      min-height:38px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:12px;
      line-height:1;
      text-decoration:none;
      backdrop-filter:blur(6px);
      padding:0 12px;
      font-weight:900;
    }

    .themeToggle{
      width:38px;
      padding:0;
      font-size:16px;
    }

    h1{
      margin:0;
      font-size:18px;
      font-weight:900;
    }

    .sub{
      margin:4px 0 0;
      font-size:11px;
      color:rgba(255,255,255,.82);
      line-height:1.35;
    }

    .lastUpdated{
      font-size:10px;
      color:rgba(255,255,255,.75);
      text-align:right;
      margin-top:8px;
    }

    main{
      max-width:980px;
      margin:0 auto;
      padding:10px;
    }

    .playerHeader{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:auto 1fr;
      gap:14px;
      align-items:center;
      margin-bottom:10px;
    }

    .photoWrap{
      width:72px;
      height:72px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--card2);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .photoWrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .photoFallback{
      font-size:18px;
      font-weight:900;
      color:var(--muted);
    }

    .playerTitle{
      font-size:20px;
      font-weight:950;
      line-height:1.1;
    }

    .playerMeta{
      margin-top:5px;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      line-height:1.35;
    }

    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
    }

    .sectionTitle h2{
      margin:0;
      font-size:14px;
      font-weight:900;
    }

    .sectionCount{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .matchCard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .topLine{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:10px;
    }

    .league{
      font-size:11px;
      font-weight:900;
      line-height:1.2;
    }

    .meta{
      margin-top:4px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      line-height:1.35;
    }

    .status{
      flex:0 0 auto;
      background:var(--pillBg);
      border:1px solid var(--pillBorder);
      border-radius:999px;
      padding:5px 8px;
      font-size:10px;
      font-weight:900;
      white-space:nowrap;
    }

    .teamsRow{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
    }

    .teamName{
      font-size:12px;
      font-weight:900;
      text-align:center;
      line-height:1.2;
    }

    .centerBox{
      min-width:112px;
      background:var(--pillBg);
      border:1px solid var(--pillBorder);
      border-radius:14px;
      padding:9px 8px;
      text-align:center;
    }

    .score{
      font-size:20px;
      font-weight:950;
      line-height:1;
    }

    .timeSub{
      margin-top:4px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      line-height:1.25;
    }

    .playerLine{
      background:var(--accentBg);
      border:1px solid var(--accentBorder);
      border-radius:14px;
      padding:10px;
      font-size:12px;
      line-height:1.5;
      font-weight:800;
    }

    .muted{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .empty{
      padding:16px;
      border-radius:16px;
      text-align:center;
      background:var(--card);
      border:1px dashed var(--line);
      color:var(--muted);
      font-size:12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="headRow">
      <div>
        <h1>Spiller</h1>
        <p class="sub">Spillerlinje hentet fra kampreferat</p>
      </div>
      <div>
        <div class="headButtons">
          <a class="headLink" href="lag.html">⭐ Lag</a>
          <a class="headLink" href="index.html">🏐 Live</a>
          <a class="headLink" href="dagens_kamper.html">📅 Dagens</a>
          <button id="themeToggle" class="themeToggle" type="button">🌙</button>
        </div>
        <div id="lastUpdated" class="lastUpdated"></div>
      </div>
    </div>
  </header>

  <main>
    <div id="playerHeader" class="playerHeader" style="display:none"></div>

    <section>
      <div class="sectionTitle">
        <h2>Ferdige kamper</h2>
        <div id="countMatches" class="sectionCount">0 kamper</div>
      </div>
      <div id="list" class="list"></div>
      <div id="empty" class="empty" style="display:none"></div>
    </section>
  </main>

  <script>
    const PLAYERS_API_URL = "https://volleyball.ronesse.no/players?limit=1000&offset=0";
    const TEAMS_API_URL = "https://volleyball.ronesse.no/teams?limit=200&offset=0";
    const EVENTS_API_URL = "https://volleyball.ronesse.no/events";
    const PLAYER_IMG_BASE = "https://volleyball.ronesse.no/img/players";
    const THEME_KEY = "volley_theme_v1";

    function qs(name){
      return new URLSearchParams(location.search).get(name);
    }

    function loadTheme(){
      try { return localStorage.getItem(THEME_KEY) || ""; }
      catch { return ""; }
    }

    function saveTheme(theme){
      try { localStorage.setItem(THEME_KEY, theme); } catch {}
    }

    function applyTheme(theme){
      const dark = theme === "dark";
      document.body.classList.toggle("dark", dark);
      document.getElementById("themeToggle").textContent = dark ? "☀️" : "🌙";
    }

    function initTheme(){
      const saved = loadTheme();
      if (saved === "dark" || saved === "light"){
        applyTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme(){
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      applyTheme(next);
      saveTheme(next);
    }

    function setLastUpdated(text){
      document.getElementById("lastUpdated").textContent = text;
    }

    async function getJson(url){
      const res = await fetch(url, {
        headers: { accept: "application/json" },
        cache: "no-store"
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function playerImageCandidates(playerId){
      return [
        `${PLAYER_IMG_BASE}/${playerId}.jpg`,
        `${PLAYER_IMG_BASE}/${playerId}.png`,
        `${PLAYER_IMG_BASE}/${playerId}.jpeg`,
        `${PLAYER_IMG_BASE}/${playerId}.webp`
      ];
    }

    function createPlayerPhoto(player){
      const wrap = document.createElement("div");
      wrap.className = "photoWrap";

      const fallback = () => {
        wrap.innerHTML = `<div class="photoFallback">${String(player.name || "?").slice(0,1).toUpperCase()}</div>`;
      };

      const candidates = playerImageCandidates(player.id);
      let idx = 0;

      const img = document.createElement("img");
      img.alt = player.name || "Spiller";
      img.loading = "lazy";
      img.onerror = () => {
        idx += 1;
        if (idx < candidates.length) img.src = candidates[idx];
        else fallback();
      };

      img.src = candidates[0];
      wrap.appendChild(img);
      return wrap;
    }

    function renderPlayerHeader(player){
      const el = document.getElementById("playerHeader");
      el.style.display = "grid";
      el.innerHTML = "";

      el.appendChild(createPlayerPhoto(player));

      const meta = [];
      if (player.position) meta.push(player.position);
      if (player.nationality) meta.push(player.nationality);
      if (player.youth_club) meta.push(`Ungdomsklubb: ${player.youth_club}`);

      const block = document.createElement("div");
      block.innerHTML = `
        <div class="playerTitle">${player.name || "Spiller"}</div>
        <div class="playerMeta">${meta.join(" · ") || "Spillerprofil"}</div>
      `;
      el.appendChild(block);
    }

    function getEventDate(event){
      if (event.start_ts != null){
        const n = Number(event.start_ts);
        if (!Number.isNaN(n)) return new Date(n * 1000);
      }
      if (event.start_utc){
        const d = new Date(String(event.start_utc).replace(" ", "T"));
        if (!Number.isNaN(d.getTime())) return d;
      }
      return null;
    }

    function formatDateOnly(date){
      if (!date) return "";
      return date.toLocaleDateString("no-NO", {
        weekday:"short",
        day:"2-digit",
        month:"2-digit",
        year:"numeric"
      });
    }

    function normalizeText(s){
      return String(s || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractPlayerLineFromSummary(summaryPayload, playerName){
      const normalizedPlayer = normalizeText(playerName);
      if (!normalizedPlayer) return "";

      if (summaryPayload?.summary_html){
        const parser = new DOMParser();
        const doc = parser.parseFromString(summaryPayload.summary_html, "text/html");
        const items = Array.from(doc.querySelectorAll("li")).map(li => li.textContent?.trim() || "");
        const match = items.find(text => normalizeText(text).includes(normalizedPlayer));
        if (match) return match;
      }

      if (summaryPayload?.summary){
        const lines = String(summaryPayload.summary)
          .split("\n")
          .map(s => s.trim())
          .filter(Boolean);

        const match = lines.find(text => normalizeText(text).includes(normalizedPlayer));
        if (match) return match.replace(/^•\s*/, "");
      }

      return "";
    }

    async function buildPlayerLine(eventId, playerName){
      try{
        const data = await getJson(`https://volleyball.ronesse.no/events/${encodeURIComponent(eventId)}/summary`);
        return extractPlayerLineFromSummary(data, playerName);
      } catch {
        return "";
      }
    }

    async function renderMatchCard(event, playerName){
      const date = getEventDate(event);
      const playerLine = await buildPlayerLine(event.event_id, playerName);

      const card = document.createElement("div");
      card.className = "matchCard";

      card.innerHTML = `
        <div class="topLine">
          <div>
            <div class="league">${event.tournament_name || "Kamp"}</div>
            <div class="meta">
              ${event.season_name || ""}${event.round ? ` · Runde ${event.round}` : ""}
              ${formatDateOnly(date) ? ` · ${formatDateOnly(date)}` : ""}
            </div>
          </div>
          <div class="status">Ferdig</div>
        </div>

        <div class="teamsRow">
          <div class="teamName">${event.home_team_name || "Hjemme"}</div>
          <div class="centerBox">
            <div class="score">${event.home_sets ?? 0}-${event.away_sets ?? 0}</div>
            <div class="timeSub">Spilt ${formatDateOnly(date)}</div>
          </div>
          <div class="teamName">${event.away_team_name || "Borte"}</div>
        </div>
      `;

      const lineBox = document.createElement("div");
      lineBox.className = playerLine ? "playerLine" : "muted";
      lineBox.textContent = playerLine || "Ingen spillerlinje funnet i kampreferatet.";
      card.appendChild(lineBox);

      return card;
    }

    async function refresh(){
      const playerId = qs("player_id");
      const playerName = qs("player_name");

      if (!playerId){
        document.getElementById("empty").style.display = "block";
        document.getElementById("empty").textContent = "Mangler player_id i adressen.";
        return;
      }

      try{
        const [players, teams] = await Promise.all([
          getJson(PLAYERS_API_URL),
          getJson(TEAMS_API_URL)
        ]);

        const player = (Array.isArray(players) ? players : []).find(
          p => String(p.id) === String(playerId)
        ) || { id: playerId, name: playerName || "Spiller" };

        renderPlayerHeader(player);

        const sofaTeamId = String(player.sofa_team_id ?? "").trim();
        const localTeamId = String(player.team_id ?? "").trim();

        let team = null;
        if (Array.isArray(teams)){
          team = teams.find(t =>
            (localTeamId && String(t.id ?? "") === localTeamId) ||
            (sofaTeamId && String(t.sofascore_team_id ?? "") === sofaTeamId)
          ) || null;
        }

        const now = new Date();
        const from = new Date(now);
        from.setFullYear(from.getFullYear() - 1);
        const to = new Date(now);
        to.setFullYear(to.getFullYear() + 1);

        const url = new URL(EVENTS_API_URL);
        url.searchParams.set("from_ts", String(Math.floor(from.getTime() / 1000)));
        url.searchParams.set("to_ts", String(Math.floor(to.getTime() / 1000)));
        url.searchParams.set("limit", "1000");
        url.searchParams.set("offset", "0");

        const events = await getJson(url.toString());

        const finishedEvents = (Array.isArray(events) ? events : [])
          .filter(ev => {
            const homeId = String(ev.home_team_id ?? "").trim();
            const awayId = String(ev.away_team_id ?? "").trim();
            return sofaTeamId && (homeId === sofaTeamId || awayId === sofaTeamId);
          })
          .filter(ev => String(ev.status_type || "").toLowerCase() === "finished")
          .sort((a, b) => Number(b.start_ts || 0) - Number(a.start_ts || 0));

        document.getElementById("countMatches").textContent = `${finishedEvents.length} kamper`;

        const list = document.getElementById("list");
        const empty = document.getElementById("empty");
        list.innerHTML = "";

        if (!finishedEvents.length){
          empty.style.display = "block";
          empty.textContent = team
            ? `Ingen ferdige kamper funnet for ${team.name}.`
            : "Ingen ferdige kamper funnet.";
        } else {
          empty.style.display = "none";
          for (const event of finishedEvents){
            list.appendChild(await renderMatchCard(event, player.name || playerName || ""));
          }
        }

        setLastUpdated(
          `Oppdatert ${new Date().toLocaleTimeString("no-NO", {
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
          })}`
        );
      } catch (err){
        document.getElementById("empty").style.display = "block";
        document.getElementById("empty").textContent = `Kunne ikke hente spillerkamper (${err.message}).`;
        setLastUpdated(`Feil ${new Date().toLocaleTimeString("no-NO", { hour:"2-digit", minute:"2-digit" })}`);
      }
    }

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);

    initTheme();
    refresh();
  </script>
</body>
</html>
