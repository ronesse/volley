<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mine lag</title>
  <style>
    :root{
      color-scheme: light;
      --bgTop:#243048;
      --bg:#edf1f5;
      --card:#f7f8fa;
      --card2:#f2f4f7;
      --text:#1f2937;
      --muted:#6b7280;
      --line:rgba(31,41,55,.08);
      --shadow:0 7px 18px rgba(15,23,42,.06);

      --live:#22c55e;
      --liveBg:#edf9f1;
      --liveBorder:rgba(34,197,94,.18);

      --toggleBg:rgba(255,255,255,.10);
      --toggleBorder:rgba(255,255,255,.14);

      --mizunoBg:rgba(59,130,246,.10);
      --mizunoBorder:rgba(59,130,246,.18);
      --mizunoText:#2563eb;

      --abroadBg:rgba(245,158,11,.10);
      --abroadBorder:rgba(245,158,11,.18);
      --abroadText:#b45309;

      --pillBg:#eef2f7;
    }

    body.dark{
      color-scheme: dark;
      --bgTop:#1f2937;
      --bg:#2b3442;
      --card:#364152;
      --card2:#313b4b;
      --text:#e7ebf1;
      --muted:#b3bdc9;
      --line:rgba(255,255,255,.08);
      --shadow:0 7px 18px rgba(0,0,0,.14);

      --live:#4ade80;
      --liveBg:rgba(74,222,128,.12);
      --liveBorder:rgba(74,222,128,.16);

      --toggleBg:rgba(255,255,255,.07);
      --toggleBorder:rgba(255,255,255,.10);

      --mizunoBg:rgba(59,130,246,.12);
      --mizunoBorder:rgba(96,165,250,.18);
      --mizunoText:#93c5fd;

      --abroadBg:rgba(245,158,11,.12);
      --abroadBorder:rgba(251,191,36,.16);
      --abroadText:#fbbf24;

      --pillBg:#303a49;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:linear-gradient(180deg,var(--bgTop) 0%,var(--bgTop) 98px,var(--bg) 98px,var(--bg) 100%);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }

    header{
      max-width:980px;
      margin:0 auto;
      padding:12px 10px 10px;
      color:#fff;
    }
    .headRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .headLeft{min-width:0}
    .headRight{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
      flex:0 0 auto;
    }
    h1{
      margin:0;
      font-size:17px;
      font-weight:900;
      letter-spacing:.18px;
    }
    .sub{
      margin:4px 0 0;
      font-size:11px;
      line-height:1.25;
      color:rgba(255,255,255,.78);
    }
    .lastUpdated{
      font-size:10px;
      white-space:nowrap;
      color:rgba(255,255,255,.75);
      text-align:right;
    }

    .headButtons{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .headLink,
    .themeToggle{
      appearance:none;
      border:1px solid var(--toggleBorder);
      background:var(--toggleBg);
      color:#fff;
      min-height:38px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:12px;
      line-height:1;
      text-decoration:none;
      backdrop-filter:blur(6px);
      padding:0 12px;
      font-weight:900;
    }

    .themeToggle{
      width:38px;
      padding:0;
      font-size:16px;
    }

    main{
      max-width:980px;
      margin:0 auto;
      padding:10px;
    }

    .summaryBar{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .summaryItem{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      box-shadow:var(--shadow);
    }
    .summaryLabel{
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.3px;
    }
    .summaryValue{
      margin-top:4px;
      font-size:20px;
      font-weight:950;
      line-height:1;
    }

    .section{
      margin-top:14px;
    }
    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
    }
    .sectionTitle h2{
      margin:0;
      font-size:14px;
      font-weight:900;
    }
    .sectionCount{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }

    .grid{
      display:grid;
      gap:8px;
      grid-template-columns:1fr;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .teamRow{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:10px;
      align-items:center;
    }

    .logoWrap{
      width:50px;
      height:50px;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--card2);
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logoWrap img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:5px;
    }
    .fallbackBox{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      font-size:13px;
      font-weight:900;
      color:var(--muted);
    }

    .teamMain{
      min-width:0;
    }
    .teamName{
      font-size:13px;
      font-weight:900;
      line-height:1.15;
    }
    .teamMeta{
      margin-top:3px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .badges{
      display:flex;
      gap:4px;
      flex-wrap:wrap;
      margin-top:6px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:3px 7px;
      border-radius:999px;
      font-size:9px;
      font-weight:900;
      line-height:1;
      text-transform:uppercase;
    }
    .badge.mizuno{
      background:var(--mizunoBg);
      border:1px solid var(--mizunoBorder);
      color:var(--mizunoText);
    }
    .badge.abroad{
      background:var(--abroadBg);
      border:1px solid var(--abroadBorder);
      color:var(--abroadText);
    }

    .statusBox{
      text-align:right;
      min-width:88px;
    }
    .statusPill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      border:1px solid var(--line);
      background:var(--pillBg);
      color:var(--text);
      white-space:nowrap;
    }
    .statusPill.live{
      background:var(--liveBg);
      border-color:var(--liveBorder);
      color:var(--live);
    }
    .dot{
      width:6px;
      height:6px;
      border-radius:999px;
      background:var(--live);
      flex:0 0 auto;
    }

    .eventBox{
      margin-top:9px;
      padding-top:9px;
      border-top:1px solid var(--line);
    }
    .eventLeague{
      font-size:10px;
      font-weight:900;
      line-height:1.15;
    }
    .eventMeta{
      margin-top:3px;
      font-size:10px;
      color:var(--muted);
      font-weight:800;
      line-height:1.2;
    }
    .versus{
      margin-top:6px;
      font-size:11px;
      font-weight:900;
      line-height:1.2;
    }

    .empty{
      padding:16px;
      border-radius:16px;
      text-align:center;
      background:var(--card);
      border:1px dashed var(--line);
      color:var(--muted);
      font-size:12px;
    }

    @media (min-width:760px){
      .grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width:520px){
      .summaryBar{
        grid-template-columns:repeat(2,1fr);
      }
      .logoWrap{
        width:44px;
        height:44px;
      }
      .statusBox{
        min-width:72px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="headRow">
      <div class="headLeft">
        <h1>Mine lag</h1>
        <p class="sub">Lag fra /teams, gruppert etter live, i dag og neste kamp</p>
      </div>
      <div class="headRight">
        <div class="headButtons">
          <a class="headLink" href="index.html">🏐 Live</a>
          <a class="headLink" href="dagens_kamper.html">📅 Dagens</a>
          <button id="themeToggle" class="themeToggle" type="button" aria-label="Bytt tema" title="Bytt dag/natt">🌙</button>
        </div>
        <div id="lastUpdated" class="lastUpdated"></div>
      </div>
    </div>
  </header>

  <main>
    <div class="summaryBar">
      <div class="summaryItem">
        <div class="summaryLabel">Live</div>
        <div id="summaryLive" class="summaryValue">0</div>
      </div>
      <div class="summaryItem">
        <div class="summaryLabel">I dag</div>
        <div id="summaryToday" class="summaryValue">0</div>
      </div>
      <div class="summaryItem">
        <div class="summaryLabel">Senere</div>
        <div id="summaryLater" class="summaryValue">0</div>
      </div>
      <div class="summaryItem">
        <div class="summaryLabel">Ingen kamp</div>
        <div id="summaryNone" class="summaryValue">0</div>
      </div>
    </div>

    <section class="section">
      <div class="sectionTitle">
        <h2>Live nå</h2>
        <div id="countLive" class="sectionCount">0 lag</div>
      </div>
      <div id="liveGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="sectionTitle">
        <h2>Spiller i dag</h2>
        <div id="countToday" class="sectionCount">0 lag</div>
      </div>
      <div id="todayGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="sectionTitle">
        <h2>Neste kamp senere</h2>
        <div id="countLater" class="sectionCount">0 lag</div>
      </div>
      <div id="laterGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="sectionTitle">
        <h2>Ingen kommende kamp funnet</h2>
        <div id="countNone" class="sectionCount">0 lag</div>
      </div>
      <div id="noneGrid" class="grid"></div>
    </section>
  </main>

  <script>
    const TEAMS_API_URL = "https://volleyball.ronesse.no/teams?limit=200&offset=0";
    const EVENTS_API_BASE = "https://volleyball.ronesse.no/events";
    const LIVE_API_URL = "https://volleyball.ronesse.no/live";
    const TEAM_LOGO_BASE = "https://volleyball.ronesse.no/img/teams";
    const THEME_KEY = "volley_theme_v1";

    let teams = [];
    let futureEvents = [];
    let liveEvents = [];
    let teamCards = [];

    function loadTheme(){
      try { return localStorage.getItem(THEME_KEY) || ""; }
      catch { return ""; }
    }

    function saveTheme(theme){
      try { localStorage.setItem(THEME_KEY, theme); } catch {}
    }

    function applyTheme(theme){
      const dark = theme === "dark";
      document.body.classList.toggle("dark", dark);
      const btn = document.getElementById("themeToggle");
      btn.textContent = dark ? "☀️" : "🌙";
      btn.title = dark ? "Bytt til dagmodus" : "Bytt til nattmodus";
      btn.setAttribute("aria-label", btn.title);
    }

    function initTheme(){
      const saved = loadTheme();
      if (saved === "dark" || saved === "light"){
        applyTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme(){
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      applyTheme(next);
      saveTheme(next);
    }

    function setLastUpdated(text){
      document.getElementById("lastUpdated").textContent = text;
    }

    async function getJson(url){
      const res = await fetch(url, {
        headers: { accept: "application/json" },
        cache: "no-store"
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function fetchTeams(){
      const data = await getJson(TEAMS_API_URL);
      return Array.isArray(data) ? data : [];
    }

    async function fetchLive(){
      const data = await getJson(LIVE_API_URL);
      return Array.isArray(data) ? data : [];
    }

    async function fetchEventsRange(fromTs, toTs){
      const url = new URL(EVENTS_API_BASE);
      url.searchParams.set("from_ts", String(fromTs));
      url.searchParams.set("to_ts", String(toTs));
      url.searchParams.set("limit", "1000");
      url.searchParams.set("offset", "0");
      const data = await getJson(url.toString());
      return Array.isArray(data) ? data : [];
    }

    function teamLogoUrl(teamId){
      return `${TEAM_LOGO_BASE}/${teamId}.png`;
    }

    function createLogo(teamId, fallbackText = ""){
      const wrap = document.createElement("div");
      wrap.className = "logoWrap";

      const img = document.createElement("img");
      img.alt = "Laglogo";
      img.loading = "lazy";
      img.src = teamLogoUrl(teamId);

      img.onerror = () => {
        wrap.innerHTML = "";
        const fb = document.createElement("div");
        fb.className = "fallbackBox";
        fb.textContent = fallbackText;
        wrap.appendChild(fb);
      };

      wrap.appendChild(img);
      return wrap;
    }

    function getTodayBounds(){
      const now = new Date();
      const start = new Date(now);
      start.setHours(0,0,0,0);

      const end = new Date(now);
      end.setHours(23,59,59,999);

      return {
        startTs: Math.floor(start.getTime() / 1000),
        endTs: Math.floor(end.getTime() / 1000)
      };
    }

    function getFutureBounds(){
      const now = new Date();
      const fromTs = Math.floor(now.getTime() / 1000);

      const future = new Date(now);
      future.setDate(future.getDate() + 21);

      const toTs = Math.floor(future.getTime() / 1000);
      return { fromTs, toTs };
    }

    function getEventDate(event){
      if (event.start_ts != null){
        const n = Number(event.start_ts);
        if (!Number.isNaN(n)) return new Date(n * 1000);
      }
      if (event.start_utc){
        const d = new Date(String(event.start_utc).replace(" ", "T"));
        if (!Number.isNaN(d.getTime())) return d;
      }
      return null;
    }

    function formatDateTime(date){
      if (!date) return "Ukjent tidspunkt";
      return date.toLocaleString("no-NO", {
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
      });
    }

    function formatDateShort(date){
      if (!date) return "";
      return date.toLocaleDateString("no-NO", {
        weekday:"short",
        day:"2-digit",
        month:"2-digit"
      });
    }

    function isToday(date){
      if (!date) return false;
      const now = new Date();
      return date.getFullYear() === now.getFullYear() &&
             date.getMonth() === now.getMonth() &&
             date.getDate() === now.getDate();
    }

    function getTeamEventMatch(team, event){
      const sofaId = String(team.sofascore_team_id ?? "");
      if (!sofaId) return false;
      return String(event.home_team_id ?? "") === sofaId || String(event.away_team_id ?? "") === sofaId;
    }

    function dedupeEventsById(events){
      const seen = new Set();
      const out = [];
      for (const event of events){
        const id = String(event.event_id ?? "");
        if (!id || seen.has(id)) continue;
        seen.add(id);
        out.push(event);
      }
      return out;
    }

    function groupTeams(sourceTeams){
      const now = new Date();

      const live = [];
      const today = [];
      const later = [];
      const none = [];

      for (const team of sourceTeams){
        const sofaId = String(team.sofascore_team_id ?? "");
        if (!sofaId) continue;

        const teamLiveEvents = liveEvents.filter(ev => getTeamEventMatch(team, ev));
        const teamFutureEvents = futureEvents
          .filter(ev => getTeamEventMatch(team, ev))
          .sort((a, b) => (Number(a.start_ts || 0) - Number(b.start_ts || 0)));

        const liveEvent = teamLiveEvents[0] || null;
        const nextEvent = teamFutureEvents.find(ev => {
          const d = getEventDate(ev);
          return d && d >= now;
        }) || null;

        const cardData = {
          team,
          liveEvent,
          nextEvent
        };

        if (liveEvent){
          live.push(cardData);
        } else if (nextEvent){
          const d = getEventDate(nextEvent);
          if (isToday(d)) today.push(cardData);
          else later.push(cardData);
        } else {
          none.push(cardData);
        }
      }

      today.sort((a, b) => (Number(a.nextEvent?.start_ts || 0) - Number(b.nextEvent?.start_ts || 0)));
      later.sort((a, b) => (Number(a.nextEvent?.start_ts || 0) - Number(b.nextEvent?.start_ts || 0)));
      live.sort((a, b) => (Number(b.liveEvent?.change_ts || 0) - Number(a.liveEvent?.change_ts || 0)));
      none.sort((a, b) => String(a.team.name || "").localeCompare(String(b.team.name || ""), "no"));

      return { live, today, later, none };
    }

    function renderBadge(groupType){
      const el = document.createElement("div");
      el.className = `badge ${groupType}`;
      el.textContent = groupType;
      return el;
    }

    function getStatusPill(type){
      const el = document.createElement("div");
      el.className = "statusPill" + (type === "live" ? " live" : "");

      if (type === "live"){
        const dot = document.createElement("span");
        dot.className = "dot";
        el.appendChild(dot);
        const text = document.createElement("span");
        text.textContent = "LIVE";
        el.appendChild(text);
        return el;
      }

      const text = document.createElement("span");
      text.textContent = type === "today" ? "I dag" : type === "later" ? "Neste" : "Ingen";
      el.appendChild(text);
      return el;
    }

    function renderTeamCard(item, state){
      const { team, liveEvent, nextEvent } = item;
      const event = liveEvent || nextEvent;

      const card = document.createElement("div");
      card.className = "card";

      const teamRow = document.createElement("div");
      teamRow.className = "teamRow";

      const logo = createLogo(team.id, (team.name || "?").slice(0,1).toUpperCase());

      const main = document.createElement("div");
      main.className = "teamMain";

      const name = document.createElement("div");
      name.className = "teamName";
      name.textContent = team.name || "Ukjent lag";

      const meta = document.createElement("div");
      meta.className = "teamMeta";
      meta.textContent = `${team.country || ""}${team.league ? ` · ${team.league}` : ""}`;

      const badges = document.createElement("div");
      badges.className = "badges";
      badges.appendChild(renderBadge(String(team.group_type || "").toLowerCase()));

      main.appendChild(name);
      main.appendChild(meta);
      main.appendChild(badges);

      const statusBox = document.createElement("div");
      statusBox.className = "statusBox";
      statusBox.appendChild(getStatusPill(state));

      teamRow.appendChild(logo);
      teamRow.appendChild(main);
      teamRow.appendChild(statusBox);

      card.appendChild(teamRow);

      const eventBox = document.createElement("div");
      eventBox.className = "eventBox";

      if (liveEvent){
        const league = document.createElement("div");
        league.className = "eventLeague";
        league.textContent = liveEvent.tournament_name || "Livekamp";

        const metaLine = document.createElement("div");
        metaLine.className = "eventMeta";
        metaLine.textContent = `${liveEvent.season_name || ""}${liveEvent.round ? ` · Runde ${liveEvent.round}` : ""}${liveEvent.status_desc ? ` · ${liveEvent.status_desc}` : ""}`;

        const versus = document.createElement("div");
        versus.className = "versus";
        versus.textContent = `${liveEvent.home_team_name || "Hjemme"} vs ${liveEvent.away_team_name || "Borte"} · ${liveEvent.home_sets ?? 0}-${liveEvent.away_sets ?? 0}`;

        eventBox.appendChild(league);
        eventBox.appendChild(metaLine);
        eventBox.appendChild(versus);
      } else if (nextEvent){
        const league = document.createElement("div");
        league.className = "eventLeague";
        league.textContent = nextEvent.tournament_name || "Neste kamp";

        const metaLine = document.createElement("div");
        metaLine.className = "eventMeta";
        const d = getEventDate(nextEvent);
        metaLine.textContent = `${formatDateTime(d)}${nextEvent.round ? ` · Runde ${nextEvent.round}` : ""}`;

        const versus = document.createElement("div");
        versus.className = "versus";
        versus.textContent = `${nextEvent.home_team_name || "Hjemme"} vs ${nextEvent.away_team_name || "Borte"}`;

        eventBox.appendChild(league);
        eventBox.appendChild(metaLine);
        eventBox.appendChild(versus);
      } else {
        const metaLine = document.createElement("div");
        metaLine.className = "eventMeta";
        metaLine.textContent = "Ingen kommende kamp funnet i hentet periode.";
        eventBox.appendChild(metaLine);
      }

      card.appendChild(eventBox);
      return card;
    }

    function renderSection(containerId, countId, items, emptyText, state){
      const container = document.getElementById(containerId);
      const countEl = document.getElementById(countId);

      container.innerHTML = "";
      countEl.textContent = `${items.length} ${items.length === 1 ? "lag" : "lag"}`;

      if (!items.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = emptyText;
        container.appendChild(empty);
        return;
      }

      items.forEach(item => container.appendChild(renderTeamCard(item, state)));
    }

    function renderSummary(groups){
      document.getElementById("summaryLive").textContent = String(groups.live.length);
      document.getElementById("summaryToday").textContent = String(groups.today.length);
      document.getElementById("summaryLater").textContent = String(groups.later.length);
      document.getElementById("summaryNone").textContent = String(groups.none.length);
    }

    function renderAll(){
      const groups = groupTeams(teams);
      renderSummary(groups);

      renderSection("liveGrid", "countLive", groups.live, "Ingen lag er live akkurat nå.", "live");
      renderSection("todayGrid", "countToday", groups.today, "Ingen flere lag spiller senere i dag.", "today");
      renderSection("laterGrid", "countLater", groups.later, "Ingen senere kamper funnet.", "later");
      renderSection("noneGrid", "countNone", groups.none, "Alle lag har kommende kamp registrert.", "none");
    }

    async function refresh(){
      try{
        const { fromTs, toTs } = getFutureBounds();

        const [teamsData, liveData, eventsData] = await Promise.all([
          fetchTeams(),
          fetchLive(),
          fetchEventsRange(fromTs, toTs)
        ]);

        teams = teamsData.filter(team => {
          const group = String(team.group_type || "").toLowerCase();
          return group === "mizuno" || group === "abroad";
        });

        buildFavoriteTeams(teams);

        liveEvents = dedupeEventsById(
          liveData.filter(ev => {
            const homeId = String(ev.home_team_id ?? "");
            const awayId = String(ev.away_team_id ?? "");
            return favoriteSofaTeamIds.has(homeId) || favoriteSofaTeamIds.has(awayId);
          })
        );

        futureEvents = dedupeEventsById(
          eventsData.filter(ev => {
            const homeId = String(ev.home_team_id ?? "");
            const awayId = String(ev.away_team_id ?? "");
            return favoriteSofaTeamIds.has(homeId) || favoriteSofaTeamIds.has(awayId);
          })
        );

        renderAll();

        setLastUpdated(
          `Oppdatert ${new Date().toLocaleTimeString("no-NO", {
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
          })}`
        );
      } catch (err){
        for (const id of ["liveGrid", "todayGrid", "laterGrid", "noneGrid"]){
          document.getElementById(id).innerHTML =
            `<div class="empty">Kunne ikke hente lagoversikt (${err.message}).</div>`;
        }
        document.getElementById("summaryLive").textContent = "0";
        document.getElementById("summaryToday").textContent = "0";
        document.getElementById("summaryLater").textContent = "0";
        document.getElementById("summaryNone").textContent = "0";
        document.getElementById("countLive").textContent = "0 lag";
        document.getElementById("countToday").textContent = "0 lag";
        document.getElementById("countLater").textContent = "0 lag";
        document.getElementById("countNone").textContent = "0 lag";
        setLastUpdated(`Feil ${new Date().toLocaleTimeString("no-NO", { hour:"2-digit", minute:"2-digit" })}`);
      }
    }

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);

    initTheme();
    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
