<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Live volleyball – adaptiv mobil</title>
  <style>
    :root{
      --bgTop:#0b1020;
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.08);
      --shadow:0 7px 18px rgba(2,6,23,.08);
      --radius:15px;

      --live:#16a34a;
      --liveBg:#ecfdf5;
      --liveBorder:rgba(22,163,74,.22);

      --pill:#f8fafc;
      --pillActive:#e0ecff;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:linear-gradient(180deg,var(--bgTop) 0%,var(--bgTop) 98px,var(--bg) 98px,var(--bg) 100%);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }

    header{
      max-width:860px;
      margin:0 auto;
      padding:11px 9px 9px;
      color:#fff;
    }
    .headRow{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
    }
    h1{
      margin:0;
      font-size:16px;
      font-weight:900;
      letter-spacing:.18px;
    }
    .sub{
      margin:3px 0 0;
      font-size:10px;
      line-height:1.2;
      color:rgba(255,255,255,.78);
    }
    .lastUpdated{
      font-size:10px;
      white-space:nowrap;
      color:rgba(255,255,255,.75);
      text-align:right;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
      margin-top:9px;
    }
    .tab{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
